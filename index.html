// --- GETTING STARTED ---
sbRegister({
  name: 'getting-started',
  title: 'Getting Started',
  description: 'Spacebridge UI is the design system for satellite communication and network management software. Built for clarity, precision, and 24/7 operational environments.',
  renderPage() {
    const colorGroups = window.COLOR_TOKENS;

    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

    let colorHTML = '';
    colorGroups.forEach(group => {
      colorHTML += `<h3 class="sb-title-s" style="margin:24px 0 10px;color:var(--text-secondary)">${group.label}</h3><div class="color-grid">`;
      group.tokens.forEach(c => {
        const val = isDark ? c.dark : c.light;
        colorHTML += `<div class="color-swatch" onclick="copyColor(this,'${val}')">
          <div class="color-swatch-preview" style="background:${val}"></div>
          <div class="color-swatch-info">
            <div class="color-swatch-name sb-body-s">${c.name}</div>
            <div class="color-swatch-hex sb-sub">${val}</div>
          </div>
        </div>`;
      });
      colorHTML += '</div>';
    });

    const weightName = w => ({ '300':'Light','400':'Regular','500':'Medium','600':'SemiBold','700':'Bold','900':'Black' }[w] || w);
    const typoRows = [
      { label: 'Brand', cls: '', size: '', weight: '', lh: null, sample: 'SpaceBridge Classic', download: './SpaceBridge-Classic.otf', downloadName: 'SpaceBridge-Classic.otf' },
      { label: 'H1',      cls: 'sb-h1',       size: '96px', weight: '300', lh: null,   sample: 'Headline' },
      { label: 'H2',      cls: 'sb-h2',       size: '64px', weight: '900', lh: null,   sample: 'Headline' },
      { label: 'H3',      cls: 'sb-h3',       size: '48px', weight: '900', lh: null,   sample: 'Headline' },
      { label: 'H4',      cls: 'sb-h4',       size: '32px', weight: '900', lh: '32px', sample: 'Headline' },
      { label: 'H5',      cls: 'sb-h5',       size: '28px', weight: '900', lh: '32px', sample: 'Headline' },
      { label: 'H6',      cls: 'sb-h6',       size: '24px', weight: '900', lh: '32px', sample: 'Headline' },
      { label: 'H7',      cls: 'sb-h7',       size: '22px', weight: '900', lh: null,   sample: 'Headline' },
      { label: 'H8',      cls: 'sb-h8',       size: '20px', weight: '700', lh: null,   sample: 'Headline' },
      { label: 'Title L', cls: 'sb-title-l',  size: '18px', weight: '500', lh: null,   sample: 'Section Title' },
      { label: 'Title M', cls: 'sb-title-m',  size: '16px', weight: '500', lh: null,   sample: 'Component Label' },
      { label: 'Title S', cls: 'sb-title-s',  size: '14px', weight: '600', lh: null,   sample: 'Section Title' },
      { label: 'Body L',  cls: 'sb-body-l',   size: '16px', weight: '400', lh: '24px', sample: 'Saturn is the sixth planet from the Sun and is famous for its stunning rings.' },
      { label: 'Body M',  cls: 'sb-body-m',   size: '14px', weight: '400', lh: '20px', sample: 'Saturn is the sixth planet from the Sun and is famous for its stunning rings.' },
      { label: 'Body S',  cls: 'sb-body-s',   size: '12px', weight: '400', lh: '20px', sample: 'Saturn is the sixth planet from the Sun and is famous for its stunning rings.' },
      { label: 'Sub',     cls: 'sb-sub',      size: '10px', weight: '400', lh: '12px', sample: 'Saturn is the sixth planet from the Sun and is famous for its stunning rings.' },
      { label: 'Caption', cls: 'sb-caption',  size: '12px', weight: '500', lh: null,   sample: 'Status Label / Category' },
      { label: 'Link L',  cls: 'sb-link-l',   size: '18px', weight: '500', lh: null,   sample: 'Learn more about Spacebridge' },
      { label: 'Link M',  cls: 'sb-link-m',   size: '16px', weight: '500', lh: null,   sample: 'Learn more about Spacebridge' },
      { label: 'Link S',  cls: 'sb-link-s',   size: '14px', weight: '500', lh: null,   sample: 'Learn more about Spacebridge' },
      { label: 'Button',  cls: 'sb-btn-text',   size: '15px', weight: '600', lh: null,   sample: 'Button Label' },
      { label: 'Badge',   cls: 'sb-badge-text', size: '10px', weight: '500', lh: '12px', sample: 'Default' },
    ];

    let typoHTML = '<div class="typo-scale">';
    typoRows.forEach(r => {
      if (r.download) {
        typoHTML += `<div class="typo-row">
          <div class="typo-label sb-body-s">${r.label}</div>
          <div class="typo-sample" style="font-family:var(--font-brand);font-size:22px;">${r.sample}</div>
          <div class="typo-end">
            <div class="typo-meta sb-body-s">OTF Font</div>
            <a class="sb-btn sb-btn-secondary sb-btn-icon sb-btn-sm" href="${r.download}" download="${r.downloadName}" title="Download font">${sbIcon('download-2-line','L')}</a>
          </div>
        </div>`;
        return;
      }
      const meta = `${r.size} / ${weightName(r.weight)}${r.lh ? ' / ' + r.lh : ''}`;
      let css = `font-size: ${r.size}; font-weight: ${r.weight};`;
      if (r.lh) css += ` line-height: ${r.lh};`;
      typoHTML += `<div class="typo-row">
        <div class="typo-label sb-body-s">${r.label}</div>
        <div class="typo-sample ${r.cls}">${r.sample}</div>
        <div class="typo-end">
          <div class="typo-meta sb-body-s">${meta}</div>
          <button class="pg-code-copy-btn" onclick="copyTypo(this,'${css}')" title="Copy style">${sbIcon('file-copy-line','L')}</button>
        </div>
      </div>`;
    });
    typoHTML += '</div>';

    return `<div class="page fade-in">
      <h1 class="page-title sb-h4">Getting Started</h1>

// --- BUTTONS ---
(() => {
function btnClass(s) {
  let cls = 'sb-btn';
  if (s.type === 'primary')   cls += s.critical ? ' sb-btn-critical' : ' sb-btn-primary';
  if (s.type === 'secondary') cls += s.critical ? ' sb-btn-secondary sb-btn-critical' : ' sb-btn-secondary';
  if (s.type === 'text')      cls += s.critical ? ' sb-btn-text sb-btn-critical' : ' sb-btn-text';
  if (s.iconOnly)             cls += s.twoIcons ? ' sb-btn-icon-2' : ' sb-btn-icon';
  if (s.iconOnly && s.small)  cls += ' sb-btn-sm';
  if (s.loading)              cls += ' sb-btn-loading';
  return cls;
}
sbRegister({
  name: 'buttons',
  title: 'Buttons',
  description: 'Компонент Basic из Figma. Типы: Primary, Secondary, Text. Состояния: Hover, Disable, Loading, Critical. Иконки: Icon-L, Icon-R, Icon-Only. Размеры: L (40px) / S (32px).',
  playground: {
    title: 'Regular',
    state: { type: 'primary', iconL: false, iconR: false, disabled: false, loading: false, critical: false, iconOnly: false, twoIcons: false, small: false },
    controls(pg) {
      return `${pg.select('type', [
        { value: 'primary', label: 'Primary' },
        { value: 'secondary', label: 'Secondary' },
        { value: 'text', label: 'Text' },
      ])}
      <div class="pg-toggles">
        ${pg.toggle('iconL', 'Icon-L')}
        ${pg.toggle('iconR', 'Icon-R')}
        ${pg.toggle('disabled', 'Disable')}
        ${pg.toggle('loading', 'Loading')}
        ${pg.toggle('critical', 'Critical')}
        ${pg.toggle('iconOnly', 'Icon-Only')}
      </div>`;
    },
    onControlChange(key, val, s) {
      if (key === 'iconOnly') {
        if (s.iconOnly) { s.iconL = false; s.iconR = false; }
        else { s.twoIcons = false; s.small = false; }
      }
      if ((key === 'iconL' || key === 'iconR') && val) {
        s.iconOnly = false;
      }
    },
    syncControls(s, container) {
      container.querySelectorAll('[data-pg-ctrl]').forEach(el => {
        const key = el.getAttribute('data-pg-ctrl');
        if (key === 'iconL' || key === 'iconR') {
          el.classList.toggle('is-disabled', !!s.iconOnly);
        }
      });
    },
    render(s) {
      const cls = btnClass(s);
      const attrs = boolAttr('disabled', s.disabled);
      const iL = sbIcon('radar-line', 'L');
      const iR = sbIcon('arrow-drop-down-line', 'L');
      const iOnly = sbIcon('add-line', 'L');
      const iOnly2 = sbIcon('arrow-drop-down-line', 'L');
      let inner = '';
      if (s.iconOnly) {
        inner = s.twoIcons ? (iOnly + iOnly2) : iOnly;
      } else {
        if (s.iconL) inner += iL + ' ';
        inner += 'Button';
        if (s.iconR) inner += ' ' + iR;
      }
      return `<button class="${cls}"${attrs}>${inner}</button>`;
    },
    extraPreview(s) {
      if (!s.iconOnly) return '';
      return `<div class="pg-extras-row">
        <div class="pg-cb-group">
          <input type="checkbox" class="sb-checkbox" id="pg-buttons-cb-2icons"${s.twoIcons ? ' checked' : ''} onchange="SB_PG.set('buttons','twoIcons',this.checked)">
          <label class="pg-cb-label sb-body-m" for="pg-buttons-cb-2icons">2 Icons</label>
        </div>
        <div class="pg-cb-group">
          <input type="checkbox" class="sb-checkbox" id="pg-buttons-cb-small"${s.small ? ' checked' : ''} onchange="SB_PG.set('buttons','small',this.checked)">
          <label class="pg-cb-label sb-body-m" for="pg-buttons-cb-small">Small</label>
        </div>
      </div>`;
    },
    genCode(s) {
      const svgIcon = (name) => `<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="${ICON_PATHS[name]}"/></svg>`;
      const IL = svgIcon('add-line');
      const IR = svgIcon('arrow-drop-down-line');
      const cls = btnClass(s);
      const attrs = boolAttr('disabled', s.disabled);
      let inner = '';
      if (s.iconOnly) {
        if (s.twoIcons) inner = `\n  ${IL}\n  ${IR}\n`;
        else inner = `\n  ${IL}\n`;
      } else {
        if (s.iconL) inner += `\n  ${IL}`;
        inner += '\n  Button';
        if (s.iconR) inner += `\n  ${IR}`;
        inner += '\n';
      }
      const html = `<button class="${cls}"${attrs}>${inner}</button>`;
      return { html, css: COMP_CSS.buttons };
    },
  },
});
})();

// --- TOGGLES ---
(() => {
function tglClass(s) {
  let cls = 'sb-toggle-wrap';
  if (s.disabled) cls += ' is-disabled';
  if (s.hasLabel && s.labelPos === 'left') cls += ' sb-toggle-label-left';
  return cls;
}
sbRegister({
  name: 'toggles',
  title: 'Toggles',
  description: 'Компонент Toggle из Figma. Размер L: 56×20px. Состояния: Off, On, Disabled. Поддержка Label слева/справа.',
  playground: {
    title: 'Regular',
    state: { on: false, disabled: false, hasLabel: true, labelPos: 'right' },
    controls(pg) {
      return `<div class="pg-grid">
        ${pg.toggle('disabled', 'Disable')}
        ${pg.toggle('hasLabel', 'Label')}
        <label class="pg-radio-item" data-pg-radio-left>
          <input type="radio" name="tgl-lblpos" value="left" onchange="SB_PG.set('toggles','labelPos','left')">
          <span>Label-Left</span>
        </label>
        <label class="pg-radio-item" data-pg-radio-right>
          <input type="radio" name="tgl-lblpos" value="right" onchange="SB_PG.set('toggles','labelPos','right')" checked>
          <span>Label-Right</span>
        </label>
      </div>`;
    },
    render(s) {
      const wrapCls = tglClass(s);
      const checkedAttr = boolAttr('checked', s.on);
      const disabledAttr = boolAttr('disabled', s.disabled);
      const labelHtml = s.hasLabel ? `<span class="sb-toggle-label-text">Label</span>` : '';
      return `<label class="${wrapCls}">
        <span class="sb-toggle">
          <input type="checkbox"${checkedAttr}${disabledAttr} onchange="SB_PG.set('toggles','on',this.checked)">
          <span class="sb-toggle-track"></span>
          <span class="sb-toggle-thumb"></span>
        </span>
        ${labelHtml}
      </label>`;
    },
    syncControls(s, container) {
      // Sync hasLabel checkbox (needs special handling since it starts checked)
      const hasLabelCb = container.querySelector('[data-pg-key="hasLabel"]');
      if (hasLabelCb) hasLabelCb.checked = s.hasLabel;
      // Show/hide radio items based on hasLabel
      const radioLeft = container.querySelector('[data-pg-radio-left]');
      const radioRight = container.querySelector('[data-pg-radio-right]');
      if (radioLeft) radioLeft.style.display = s.hasLabel ? '' : 'none';
      if (radioRight) radioRight.style.display = s.hasLabel ? '' : 'none';
      // Sync radio selection
      const rbLeft = container.querySelector('input[value="left"]');
      const rbRight = container.querySelector('input[value="right"]');
      if (rbLeft) rbLeft.checked = s.labelPos === 'left';
      if (rbRight) rbRight.checked = s.labelPos === 'right';
    },
    genCode(s) {
      const wrapCls = tglClass(s);
      const checkedAttr = s.on ? '\n    checked' : '';
      const disabledAttr = s.disabled ? '\n    disabled' : '';
      const labelHTML = s.hasLabel ? `\n  <span class="sb-toggle-label-text">Label</span>` : '';
      const html = `<label class="${wrapCls}">\n  <span class="sb-toggle">\n    <input type="checkbox"${checkedAttr}${disabledAttr}>\n    <span class="sb-toggle-track"></span>\n    <span class="sb-toggle-thumb"></span>\n  </span>${labelHTML}\n</label>`;
      return { html, css: COMP_CSS.toggles };
    },
  },
});
})();

// --- CHECKBOX ---
(() => {
  const CHECK  = `<svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const CHECK_DIS = `<svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="var(--text-disabled)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const MINUS = `<svg width="10" height="2" viewBox="0 0 10 2" fill="none"><path d="M1 1H9" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>`;

  function mkCb(opts = {}) {
    const { checked, indeterminate, disabled, hover, label } = opts;
    let cls = 'sb-checkbox';
    if (hover)         cls += ' hover';
    if (checked)       cls += ' checked';
    if (indeterminate) cls += ' indeterminate';
    if (disabled)      cls += ' disabled';
    const icon = indeterminate ? MINUS : (checked && disabled) ? CHECK_DIS : checked ? CHECK : '';
    const lbl  = label ? `<span class="sb-checkbox-label">${label}</span>` : '';
    return `<div class="${cls}"><div class="sb-checkbox-box">${icon}</div>${lbl}</div>`;
  }

  sbRegister({
    name: 'checkbox',
    title: 'Checkbox',
    description: 'Элемент формы для выбора опций. Размер 20×20px, border-radius 4px. Состояния: Default, Hover, Checked, Disabled, Indeterminate (Unselect All). Поддержка Label.',
    playground: {
      title: 'Checkbox Playground',
      state: { checked: false, disabled: false, hasLabel: false, type: 'check' },
      controls(pg) {
        return `<div class="pg-grid">
          ${pg.toggle('checked', 'Checked')}
          ${pg.toggle('disabled', 'Disabled')}
          ${pg.toggle('hasLabel', 'Label')}
          <label class="pg-radio-item" data-pg-radio-left>
            <input type="radio" name="cb-type" value="check" onchange="SB_PG.set('checkbox','type','check')" checked>
            <span>Check</span>
          </label>
          <label class="pg-radio-item" data-pg-radio-right>
            <input type="radio" name="cb-type" value="unselect" onchange="SB_PG.set('checkbox','type','unselect')">
            <span>Unselect All</span>
          </label>
        </div>`;
      },
      syncControls(s, container) {
        const rbCheck = container.querySelector('input[value="check"]');
        const rbUnselect = container.querySelector('input[value="unselect"]');
        if (rbCheck) rbCheck.checked = s.type === 'check';
        if (rbUnselect) rbUnselect.checked = s.type === 'unselect';
      },
      render(s) {
        const indeterminate = s.type === 'unselect';
        const icon = indeterminate ? MINUS : (s.checked && s.disabled) ? CHECK_DIS : s.checked ? CHECK : '';
        let cls = 'sb-checkbox';
        if (s.checked)      cls += ' checked';
        if (indeterminate)  cls += ' indeterminate';
        if (s.disabled)     cls += ' disabled';
        const click = (!s.disabled && !indeterminate)

        const lbl = s.hasLabel ? `<span class="sb-checkbox-label">Title</span>` : '';
        return `<div class="${cls}" style="cursor:pointer"${click}><div class="sb-checkbox-box">${icon}</div>${lbl}</div>`;
      },
      genCode(s) {
        const isUnselect = s.type === 'unselect';
        const icon = isUnselect ? MINUS : (s.checked && s.disabled) ? CHECK_DIS : s.checked ? CHECK : '';
        let cls = 'sb-checkbox';

        if (isUnselect)   cls += ' indeterminate';
        if (s.disabled)   cls += ' disabled';
        const lbl = s.hasLabel ? `\n  <span class="sb-checkbox-label">Title</span>` : '';
        const html = `<div class="${cls}">\n  <div class="sb-checkbox-box">${icon}</div>${lbl}\n</div>`;
        return { html, css: COMP_CSS.checkbox };
      },

        preview: `<div style="display:flex;gap:20px;align-items:center">

          ${mkCb({ checked: true, disabled: true })}

        html: `<!-- Default -->\n<div class="sb-checkbox"><div class="sb-checkbox-box"></div></div>\n\n<!-- Checked -->\n<div class="sb-checkbox checked"><div class="sb-checkbox-box">${CHECK}</div></div>\n\n<!-- Disabled + Checked -->\n<div class="sb-checkbox disabled checked"><div class="sb-checkbox-box">${CHECK_DIS}</div></div>\n\n<!-- Indeterminate -->\n<div class="sb-checkbox indeterminate"><div class="sb-checkbox-box">${MINUS}</div></div>`,
        css: COMP_CSS.checkbox,

      {

// --- COUNTERS ---
(() => {
  function fmtN(n) {
    if (n >= 1_000_000) return (n / 1_000_000 % 1 === 0 ? n / 1_000_000 : (n / 1_000_000).toFixed(1).replace(/\.0$/, '')) + 'M';
    if (n >= 10_000)    return (n / 1_000 % 1 === 0    ? n / 1_000    : (n / 1_000).toFixed(1).replace(/\.0$/, ''))    + 'K';
    return n;
  }

  function mkCnt(opts = {}) {
    const { type = 'single', value = 9, max = 9999, empty = false } = opts;
    if (type === 'range') {
      if (empty) return `<div class="sb-counter range empty">--/--</div>`;
      return `<div class="sb-counter range"><span class="sb-counter-online">${fmtN(value)}</span><span class="sb-counter-sep">/</span><span class="sb-counter-total">${fmtN(max)}</span></div>`;
    }
    if (empty) return `<div class="sb-counter empty">--</div>`;
    return `<div class="sb-counter">${fmtN(value)}</div>`;
  }

  sbRegister({
    name: 'counters',
    title: 'Counters',
    description: 'Компактный элемент отображения числовых значений. Высота 24px, border-radius 4px. Варианты: Single (одно значение), Range (текущее/максимум). Состояние Empty — плейсхолдер.',
    playground: {
      title: 'Counter Playground',
      state: { type: 'single', value: 9, max: 9999, empty: false },
      controls(pg) {
        return `<div class="pg-grid">
          ${pg.toggle('empty', 'Empty')}
          <label class="pg-radio-item" data-cnt-single>
            <input type="radio" name="cnt-type" value="single" onchange="SB_PG.set('counters','type','single')" checked>
            <span>Single</span>
          </label>
          <label class="pg-radio-item" data-cnt-range>
            <input type="radio" name="cnt-type" value="range" onchange="SB_PG.set('counters','type','range')">
            <span>Range</span>
          </label>
        </div>`;
      },
      syncControls(s, container) {
        const rbSingle = container.querySelector('input[value="single"]');
        const rbRange  = container.querySelector('input[value="range"]');
        if (rbSingle) rbSingle.checked = s.type === 'single';
        if (rbRange)  rbRange.checked  = s.type === 'range';
      },
      render(s) { return mkCnt(s); },
      genCode(s) { return { html: mkCnt(s), css: COMP_CSS.counter }; },
    },
    sections: [
      {
        title: 'Single',
        desc: 'Одиночное числовое значение. Минимальная ширина 24px, растёт по контенту.',
        preview: `<div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
          ${mkCnt({ value: 9 })}
          ${mkCnt({ value: 999 })}
          ${mkCnt({ value: 9999 })}
          ${mkCnt({ value: 10000 })}
          ${mkCnt({ value: 150000 })}
          ${mkCnt({ value: 1500000 })}
          ${mkCnt({ empty: true })}
        </div>`,
        html: `<!-- Single -->\n<div class="sb-counter">9</div>\n\n<!-- Empty -->\n<div class="sb-counter empty">--</div>`,
        css: COMP_CSS.counter,
      },
      {
        title: 'Range',
        desc: 'Формат value/max — используется для отображения заполненности (слоты, квоты, списки).',
        preview: `<div style="display:flex;gap:16px;align-items:center">
          ${mkCnt({ type: 'range', value: 1,    max: 9 })}

(() => {
  const CLEAR_ICON = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

  function mkTf(opts = {}) {
    const { value = 'Input', placeholder, selected, critical, disabled, readOnly, lineView, showTitle = true, title = 'Title', fieldMode } = opts;
    let cls = 'sb-tf';
    if (selected)  cls += ' selected';
    if (critical)  cls += ' critical';
    if (disabled)  cls += ' disabled';
    if (readOnly)  cls += ' read-only';
    if (lineView)  cls += ' line-view';
    const inputVal    = placeholder ? '' : value;
    const inputPH     = placeholder ? 'Placeholder' : '';
    const widthStyle  = fieldMode ? 'width:100%' : 'width:100%;max-width:360px';
    const onInput     = `oninput="var b=this.closest('.sb-tf').querySelector('.sb-tf-clear');if(b)b.style.display=this.value.length?'flex':'none'"`;
    const clearBtn    = `<button class="sb-tf-clear" style="background:none;border:none;cursor:pointer;color:var(--text-disabled);display:none;padding:0;align-items:center" onclick="var i=this.closest('.sb-tf').querySelector('input');i.value='';i.dispatchEvent(new Event('input'));i.focus()">${CLEAR_ICON}</button>`;
    const rightEl     = showTitle
      ? `<div class="sb-tf-right">${clearBtn}<span class="sb-tf-title">${title}</span></div>` : '';
    return `<div class="${cls}" style="${widthStyle}"><input class="sb-tf-input" type="text" value="${inputVal}" placeholder="${inputPH}" ${onInput}>${rightEl}</div>`;
  }

  function mkField(tfOpts = {}, fOpts = {}) {
    const { label, subscription, description, twoRow } = fOpts;

    const subEl = subscription
      ? `<span class="sb-field-sub${tfOpts.critical ? ' sb-field-sub--error' : ''}">${subscription}</span>`
      : '';
    if (twoRow) {
      return `<div class="sb-field two-row">
        <div class="sb-field-left">
          ${label       ? `<span class="sb-field-label">${label}</span>` : ''}
          ${description ? `<span class="sb-field-desc">${description}</span>` : ''}
        </div>
        <div class="sb-field-right">
          ${inputEl}
          ${subEl}
        </div>
      </div>`;
    }
    return `<div class="sb-field">
      ${label ? `<span class="sb-field-label">${label}</span>` : ''}
      ${inputEl}
      ${subEl}
    </div>`;
  }

  sbRegister({
    name: 'input',
    title: 'Input',
    description: 'Текстовое поле. Высота 32px, border-radius 2px. Варианты: Filled и Line View. Состояния: Default, Placeholder, Selected, Critical, Disabled, Read Only. Поддержка Label, Subscription и 2-row лейаута.',

      controls(pg) {

          ${pg.toggle('selected',   'Selected')}
          ${pg.toggle('critical',   'Critical')}
          ${pg.toggle('disabled',   'Disable')}
          ${pg.toggle('readOnly',   'Read Only')}
          ${pg.toggle('lineView',   'Line View')}
          ${pg.toggle('showTitle',  'Title')}
          ${pg.toggle('showLabel',  'Label')}
          ${pg.toggle('showSub',    'Subscription')}
          ${pg.toggle('twoRow',     '2 Rows',       { requires: 'showLabel' })}
          ${pg.toggle('showDesc',   'Description',  { requires: 'showLabel' })}
        </div>`;
      },
      render(s) {
        const fOpts = {
          label:        s.showLabel ? 'Label' : null,
          subscription: s.showSub   ? 'Subscription text' : null,
          description:  s.showDesc && s.twoRow ? 'Description text' : null,
          twoRow:       s.twoRow && s.showLabel,
        };
        return mkField(s, fOpts);
      },
      genCode(s) {
        const fOpts = {
          label:        s.showLabel ? 'Label' : null,
          subscription: s.showSub   ? 'Subscription text' : null,
          description:  s.showDesc && s.twoRow ? 'Description text' : null,
          twoRow:       s.twoRow && s.showLabel,
        };
        const css = (s.showLabel || s.showSub)
          ? COMP_CSS.inputField + '\n' + COMP_CSS.inputFieldWrap
          : COMP_CSS.inputField;
        return { html: mkField(s, fOpts), css };
      },

    sections: [

  const p = (d, f) => `  <path d="${d}" fill="${f}"/>`;
  const svg = (...paths) => `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">\n${paths.join('\n')}\n</svg>`;
  const makeSet = (ON, DIM, ERR, EDIM) => ({
    'Antenna-Strong.svg': svg(p(P_OUTER, ON),   p(P_MID, ON),   p(P_INNER, ON)),
    'Antenna-Middle.svg': svg(p(P_OUTER, DIM),  p(P_MID, ON),   p(P_INNER, ON)),
    'Antenna-Weak.svg':   svg(p(P_OUTER, DIM),  p(P_MID, DIM),  p(P_INNER, ON)),
    'Antenna-Zero.svg':   svg(p(P_OUTER, DIM),  p(P_MID, DIM),  p(P_INNER, DIM)),
    'Antenna-Error.svg':  svg(p(P_OUTER_ERR, EDIM), p(P_MID, EDIM), p(P_INNER, EDIM),
                              `  <path d="M16 9H18V15H16V9Z" fill="${ERR}"/>`,
                              `  <rect x="16" y="16" width="2" height="2" rx="1" fill="${ERR}"/>`),
  });
  const themes = {
    'dark':  makeSet('#0BD07A', '#2A3D54', '#FF4757', '#5A7089'),
    'light': makeSet('#04C40C', '#BFC5D2', '#EF0C0F', '#8798AD'),
  };
  const zip = new JSZip();
  Object.entries(themes).forEach(([folder, files]) =>
    Object.entries(files).forEach(([name, content]) => zip.file(`${folder}/${name}`, content))
  );
  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'antenna-icons.zip'; a.click();
  URL.revokeObjectURL(url);
};

function _avContent(type, initials) {
  if (type === 'initials') return `<span class="sb-avatar-initials">${initials || 'NS'}</span>`;
  if (type === 'image')    return `<img class="sb-avatar-photo" src="./astronaut.png" alt="">`;
  if (type === 'company')  return sbIcon('building-2-line', 'L');
  return sbIcon('user-line', 'L');
}
function mkAv(type, opts, initials) {
  const o = opts || {};
  return `<div class="sb-avatar"${o.hover ? ' data-hover="true"' : ''}${o.badge ? ' data-badge="true"' : ''}>`
    + `<div class="sb-avatar-circle">${_avContent(type, initials)}</div>`
    + (o.status ? '<span class="sb-status-dot mini online"></span>' : '')
    + (o.badge  ? '<span class="sb-pin">ADMIN ★</span>' : '')
    + `</div>`;
}
function avStateRow(type, initials) {
  const states = [
    { label: 'Default',   opts: {} },
    { label: 'Hover',     opts: { hover: true } },
    { label: '+Status',   opts: { status: true } },
    { label: 'H+Status',  opts: { hover: true, status: true } },
    { label: '+Badge',    opts: { badge: true } },
    { label: 'H+Badge',   opts: { hover: true, badge: true } },
    { label: 'B+Status',  opts: { badge: true, status: true } },
    { label: 'H+B+S',     opts: { hover: true, badge: true, status: true } },
  ];
  return `<div style="display:flex;gap:20px;padding-bottom:20px;flex-wrap:wrap">`
    + states.map(st =>
        `<div style="display:flex;flex-direction:column;align-items:center;gap:10px">`
        + mkAv(type, st.opts, initials)
        + `<span class="sb-sub" style="color:var(--text-tertiary);white-space:nowrap">${st.label}</span>`
        + `</div>`
      ).join('')
    + `</div>`;
}

//  ZONE F: RENDER & INIT
// ═══════════════════════════════════════
function renderPage(id) {
  _exBoxId = 0;
  Object.keys(_exBoxInitial).forEach(k => delete _exBoxInitial[k]);
  const content = document.getElementById('content');
  try {
    if (SB_REGISTRY[id]) {
      content.innerHTML = renderComponentPage(id);
      if (SB_REGISTRY[id].playground) SB_PG.render(id);
      if (SB_REGISTRY[id].onMount) SB_REGISTRY[id].onMount();
    } else {
      let label = id;
      NAV.forEach(g => g.items.forEach(i => { if (i.id === id) label = i.label; }));
      content.innerHTML = comingSoonPage(label);
    }
  } catch(e) {
    console.error(`renderPage("${id}") failed:`, e);
    content.innerHTML = `<div class="page fade-in"><p style="color:var(--status-error);padding:24px;font-family:monospace">${e.message}</p></div>`;
  }
  content.scrollTop = 0;
}

function init() {
  renderSidebar();
  const id = location.hash.slice(1) || 'getting-started';
  renderPage(id);
}

init();
</script>
