<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spacebridge UI — Design System</title>
<!-- Theme: читаем из localStorage ДО первого paint, чтобы не было flash -->
<script>(function(){var t=localStorage.getItem('sb-theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>

<!-- Color tokens — редактируются в js/tokens.js -->
<script src="js/tokens.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Base styles -->
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/typography.css">
<link rel="stylesheet" href="css/playground.css">
<link rel="stylesheet" href="css/docs.css">
<link rel="stylesheet" href="css/animations.css">

<!-- Component styles (порядок не важен для CSS — scope по классам) -->
<link rel="stylesheet" href="css/components/buttons.css">
<link rel="stylesheet" href="css/components/chevron.css">
<link rel="stylesheet" href="css/components/separator.css">
<link rel="stylesheet" href="css/components/avatar.css">
<link rel="stylesheet" href="css/components/toggles.css">
<link rel="stylesheet" href="css/components/checkbox.css">
<link rel="stylesheet" href="css/components/radio.css">
<link rel="stylesheet" href="css/components/counter.css">
<link rel="stylesheet" href="css/components/kbd.css">
<link rel="stylesheet" href="css/components/search-bar.css">
<link rel="stylesheet" href="css/components/input.css">
<link rel="stylesheet" href="css/components/textarea.css">
<link rel="stylesheet" href="css/components/password.css">
<link rel="stylesheet" href="css/components/selector.css">
<link rel="stylesheet" href="css/components/tags.css">
<link rel="stylesheet" href="css/components/status.css">
<link rel="stylesheet" href="css/components/badge.css">
<link rel="stylesheet" href="css/components/pin.css">
<link rel="stylesheet" href="css/components/notifications.css">
<link rel="stylesheet" href="css/components/table.css">
<link rel="stylesheet" href="css/components/list.css">
<link rel="stylesheet" href="css/components/context-menu.css">
<link rel="stylesheet" href="css/components/segment-menu.css">
<link rel="stylesheet" href="css/components/tabs.css">
<link rel="stylesheet" href="css/components/tab-bar.css">
<link rel="stylesheet" href="css/components/toc.css">
<link rel="stylesheet" href="css/components/breadcrumbs.css">
<link rel="stylesheet" href="css/components/pagination.css">
<link rel="stylesheet" href="css/components/table-footer.css">
<link rel="stylesheet" href="css/components/nav-bar.css">
<link rel="stylesheet" href="css/components/sub-nav.css">
<link rel="stylesheet" href="css/components/tool-bar.css">
<link rel="stylesheet" href="css/components/led-panel.css">
<link rel="stylesheet" href="css/components/section-header.css">
<link rel="stylesheet" href="css/components/header-xs.css">
<link rel="stylesheet" href="css/components/header-s.css">
<link rel="stylesheet" href="css/components/header-m.css">
<link rel="stylesheet" href="css/components/header-l.css">

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>

<div class="app">
  <!-- TOPBAR — dogfood собственного Nav Bar компонента.
       Текущий вариант: текстовый brand-логотип (SPACEBRIDGE / SB).
       Чтобы вернуться к SVG-лого — содержимое .sb-nav-bar-logo-full /
       .sb-nav-bar-logo-compact span'ов замени на <svg>...</svg>.
       Компонент принимает любой HTML внутри этих слотов. -->
  <header class="sb-nav-bar" style="flex-shrink:0">
    <div class="sb-nav-bar-left">
      <span class="sb-nav-bar-logo-full">
        <span class="sb-brand" style="font-size:18px;color:var(--primary)">SPACEBRIDGE</span>
      </span>
      <span class="sb-nav-bar-logo-compact">
        <span class="sb-brand" style="font-size:18px;color:var(--primary)">SB</span>
      </span>
      <span class="sb-nav-bar-logo-title sb-caption" style="color:var(--text-secondary)">| Design System</span>
      <span class="sb-nav-bar-badge"><span class="sb-badge-status mini bs-blue">v1.0.0</span></span>
    </div>
    <div class="sb-nav-bar-center"></div>
    <div class="sb-nav-bar-right" id="dsNavRight">
      <!-- Language switcher injected here on init() через sbMkLangSwitcher. -->
      <button class="sb-btn sb-btn-secondary sb-btn-icon" onclick="toggleTheme()" title="Toggle theme" id="themeBtn"></button>
    </div>
  </header>

  <div class="body">
    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar"></nav>

    <!-- CONTENT -->
    <main class="content" id="content"></main>
  </div>
</div>

<!-- JS: порядок важен. См. js/_index.js -->
<script src="js/core.js"></script>
<script src="js/docs-helpers.js"></script>

<!-- Components (порядок: сначала те, чей COMP_CSS-ключ используют другие —
     chevron и input перед selector/textarea/password) -->
<script src="js/components/buttons.js"></script>
<script src="js/components/chevron.js"></script>
<script src="js/components/separators.js"></script>
<script src="js/components/avatar.js"></script>
<script src="js/components/toggles.js"></script>
<script src="js/components/checkbox.js"></script>
<script src="js/components/radio.js"></script>
<script src="js/components/counters.js"></script>
<script src="js/components/kbd.js"></script>
<script src="js/components/search-bar.js"></script>
<script src="js/components/input.js"></script>
<script src="js/components/textarea.js"></script>
<script src="js/components/password.js"></script>
<script src="js/components/selectors.js"></script>
<script src="js/components/tags.js"></script>
<script src="js/components/status.js"></script>
<script src="js/components/badge.js"></script>
<script src="js/components/notifications.js"></script>
<script src="js/components/table.js"></script>
<script src="js/components/list.js"></script>
<script src="js/components/context-menu.js"></script>
<!-- section-header — зависит от sbMkContextCell, поэтому ПОСЛЕ context-menu.
     Но должен идти ДО segment-menu / nav-bar, которые юзают sbMkSectionHeader в превью. -->
<script src="js/components/section-header.js"></script>
<script src="js/components/segment-menu.js"></script>
<!-- tabs (building block) — должен идти ДО tab-bar.js, который юзает sbMkTab. -->
<script src="js/components/tabs.js"></script>
<script src="js/components/tab-bar.js"></script>
<script src="js/components/toc.js"></script>
<script src="js/components/breadcrumbs.js"></script>
<!-- pagination: зависит от sb-btn-secondary (buttons.css/.js загружены первыми)
     и sb-tf (input.js загружен в Inputs-блоке выше). -->
<script src="js/components/pagination.js"></script>
<!-- table-footer: использует sbMkPagination в demo-секциях → должен грузиться ПОСЛЕ pagination.js. -->
<script src="js/components/table-footer.js"></script>
<script src="js/components/header-xs.js"></script>
<script src="js/components/header-s.js"></script>
<script src="js/components/header-m.js"></script>
<script src="js/components/header-l.js"></script>
<script src="js/components/nav-bar.js"></script>
<!-- led-panel — переиспользует .sb-status-dot из status.css. status.js
     уже загружен выше. ВАЖНО: грузим ДО sub-nav.js, потому что sub-nav
     юзает sbMkLedPanel в demo-секциях. -->
<script src="js/components/led-panel.js"></script>
<!-- sub-nav зависит от sbMkSegmentMenu И sbMkLedPanel (демо внутри). -->
<script src="js/components/sub-nav.js"></script>
<!-- tool-bar — демо юзает sbMkTabBar, sbMkSearch → должен грузиться после них. -->
<script src="js/components/tool-bar.js"></script>
<script src="js/components/getting-started.js"></script>

<script src="js/init.js"></script>

<!-- Inject lang switcher в DS chrome right slot. После init.js потому что
     sbMkLangSwitcher экспортится из nav-bar.js (загружается выше). Switcher
     обёрнут в IIFE — без top-level переменных и DOM-listener'ов. -->
<script>
(function(){
  var right = document.getElementById('dsNavRight');
  if (!right || typeof sbMkLangSwitcher !== 'function') return;
  var tmp = document.createElement('div');
  tmp.innerHTML = sbMkLangSwitcher();
  var switcher = tmp.firstElementChild;
  right.insertBefore(switcher, right.firstChild);
})();
</script>
</body>
</html>
